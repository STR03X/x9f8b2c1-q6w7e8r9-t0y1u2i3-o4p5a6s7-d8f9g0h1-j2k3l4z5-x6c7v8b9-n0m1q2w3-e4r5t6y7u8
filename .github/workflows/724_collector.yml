name: 7/24 Kesintisiz Veri Toplayıcı

on:
  workflow_dispatch: # Manuel başlatma butonu (Actions sekmesindeki mavi buton)
  repository_dispatch:
    types: [RESTART_BOT] # Botun süre bitiminde kendi kendini otomatik tetikleme bayrağı

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Proje Kodlarını Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri ve Tarayıcıyı Yükle
        run: |
          pip install playwright colorama
          playwright install chromium
          playwright install-deps

      - name: Şifreli Tarayıcı Profilini Çöz ve Klasöre Çıkar
        env:
          ZIP_PASS: ${{ secrets.ZIP_PASSWORD }} # Kasadaki 510 karakterlik şifre
        run: |
          sudo apt-get update && sudo apt-get install -y p7zip-full
          
          # Şifre parametresini Linux'un en stabil okuyacağı çift tırnaklı standart formatta veriyoruz
          7z x browser_data.zip "-p$ZIP_PASS" -y -o.

      - name: Veri Toplama Botunu Başlat (5 Saat 50 Dakika)
        run: |
          # Eğer daha önce kaydedilmiş bir dataset.csv yoksa boş bir tane oluştur
          if [ ! -f "dataset.csv" ]; then
            touch dataset.csv
          fi
          
          # Python botunu arka planda (arka planda çalışması için sonuna & koyduk) başlatıyoruz
          python collector.py &
          
          # 21000 saniye (yani tam 5 saat 50 dakika) boyunca botun veri toplamasını bekliyoruz
          sleep 21000
          
          # GitHub Actions'ın 6 saatlik sınırına takılmamak için sürenin sonunda botu güvenli kapatıyoruz
          pkill -f collector.py || true

      - name: Toplanan Verileri GitHub Deposuna Kaydet (Commit & Push)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Sadece toplanan verilerin yazıldığı dataset.csv dosyasını kaydediyoruz
          git add dataset.csv
          git commit -m "Veri seti güncellendi [Otomatik]" || echo "Değişiklik yok"
          git push

      - name: Sonraki 6 Saatlik Döngüyü Tetikle (Sonsuz Döngü)
        run: |
          # GitHub API'sine istek atarak bu workflow'u sonraki 6 saat için yeniden tetikliyoruz
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "RESTART_BOT"}'
