name: 7/24 Kesintisiz Veri Toplayıcı

on:
  workflow_dispatch: # Manuel başlatma butonu
  repository_dispatch:
    types: [RESTART_BOT] # Otomatik döngü tetikleyicisi

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Proje Kodlarını Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Gerekli Kütüphaneleri ve Tarayıcıyı Yükle
        run: |
          pip install playwright colorama
          playwright install chromium
          playwright install-deps

      - name: Şifreli Tarayıcı Profilini Çöz (RAR Formatı)
        env:
          ZIP_PASS: ${{ secrets.ZIP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y unrar
          CLEAN_PASS=$(echo -n "$ZIP_PASS" | tr -d '\r\n[:space:]')

          # 4. AKSİYON: browser_data/ klasörüne çıkar (kod bu klasörü bekliyor)
          mkdir -p browser_data
          unrar x -p"$CLEAN_PASS" browser_data.rar browser_data/

          # --- TEŞHIS: Profil dizini kontrolü ---
          echo "=== browser_data/ içeriği ==="
          if [ -d "browser_data/Default" ]; then
            echo "✅ browser_data/Default/ klasörü BULUNDU"
            ls browser_data/Default/ | head -10
          else
            echo "❌ browser_data/Default/ YOK! Sorun burada."
            ls -la browser_data/ | head -20
          fi

      - name: Veri Toplama Botunu Başlat (5 Saat 50 Dakika)
        run: |
          if [ ! -f "dataset.csv" ]; then
            touch dataset.csv
          fi

          # Botu başlat, logları kaydet
          python collector.py > bot_output.log 2>&1 &
          BOT_PID=$!
          echo "Bot PID: $BOT_PID"

          # 5 dakika bekle, ilk logları kontrol et
          sleep 300
          echo "=== İLK 5 DAKİKA LOGLARI ==="
          cat bot_output.log | tail -50

          # Kalan süreyi bekle (21000 - 300 = 20700 saniye)
          sleep 20700
          pkill -f collector.py || true

          echo "=== SON LOGLAR ==="
          cat bot_output.log | tail -30

      - name: Debug Dosyalarını Yükle (Teşhis İçin)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files-${{ github.run_number }}
          path: |
            bot_output.log
            crash.log
          if-no-files-found: warn
          retention-days: 3

      - name: Toplanan Verileri GitHub Deposuna Kaydet (Commit & Push)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add dataset.csv
          git commit -m "Veri seti güncellendi [Otomatik]" || echo "Değişiklik yok"
          git push

      - name: Sonraki 6 Saatlik Döngüyü Tetikle (Sonsuz Döngü)
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "RESTART_BOT"}'
