name: 7/24 Kesintisiz Veri Toplayıcı

on:
  workflow_dispatch: # Manuel başlatma butonu
  repository_dispatch:
    types: [RESTART_BOT] # Otomatik döngü tetikleyicisi

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Proje Kodlarını Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Gerekli Kütüphaneleri ve Tarayıcıyı Yükle
        run: |
          pip install playwright colorama
          playwright install chromium
          playwright install-deps

      - name: auth.json Dosyasini Olustur (Giris Cerezleri)
        env:
          AUTH_JSON_DATA: ${{ secrets.BINOMO_AUTH_JSON }}
        run: |
          mkdir -p browser_data
          echo "$AUTH_JSON_DATA" > auth.json

      - name: Veri Toplama Botunu Başlat (5 Saat 50 Dakika)
        run: |
          if [ ! -f "dataset.csv" ]; then
            touch dataset.csv
          fi

          timeout 21000 python -u collector.py 2>&1 | tee bot_output.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ] && [ $STATUS -ne 124 ]; then
            echo "Bot Hata ile Sonlandi: $STATUS"
            exit $STATUS
          fi

      - name: Debug Dosyalarını Yükle (Teşhis İçin)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files-${{ github.run_number }}
          path: |
            bot_output.log
            crash.log
          if-no-files-found: warn
          retention-days: 3

      - name: Toplanan Verileri GitHub Deposuna Kaydet (Commit & Push)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add dataset.csv
          git commit -m "Veri seti güncellendi [Otomatik]" || echo "Değişiklik yok"
          git push

      - name: Sonraki 6 Saatlik Döngüyü Tetikle (Sonsuz Döngü)
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "RESTART_BOT"}'
