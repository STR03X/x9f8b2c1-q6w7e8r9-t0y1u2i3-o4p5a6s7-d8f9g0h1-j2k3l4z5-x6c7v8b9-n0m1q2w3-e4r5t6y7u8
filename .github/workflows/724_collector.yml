name: 7/24 Kesintisiz Veri Toplayıcı

on:
  workflow_dispatch: # Manuel başlatma butonu
  repository_dispatch:
    types: [RESTART_BOT] # Otomatik döngü tetikleyicisi

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Proje Kodlarını Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri ve Tarayıcıyı Yükle
        run: |
          pip install playwright colorama
          playwright install chromium
          playwright install-deps

      - name: Şifreli Tarayıcı Profilini Çöz (RAR Formatı)
        env:
          ZIP_PASS: ${{ secrets.ZIP_PASSWORD }} # Kasadaki 510 karakterlik şifreniz
        run: |
          # 1. Linux sunucusuna RAR dosyalarını açabilmesi için resmi paketi kuruyoruz
          sudo apt-get update && sudo apt-get install -y unrar
          
          # 2. Windows kopyalama tuzağına karşı görünmez boşlukları temizle
          CLEAN_PASS=$(echo -n "$ZIP_PASS" | tr -d '\r\n[:space:]')
          
          # 3. Teşhis Bilgileri
          LEN=${#CLEAN_PASS}
          START_CHARS=$(echo -n "$CLEAN_PASS" | head -c 3)
          END_CHARS=$(echo -n "$CLEAN_PASS" | tail -c 3)
          echo ">>> [TEŞHİS] Gelen Şifre Uzunluğu: $LEN karakter."
          echo ">>> [TEŞHİS] Şifre Başı/Sonu: ${START_CHARS}...${END_CHARS}"
          
          # 4. AKSİYON: unrar kullanarak klasör yapısını bozmadan (-e yerine x komutuyla) dışarı çıkar
          unrar x -p"$CLEAN_PASS" browser_data.rar

      - name: Veri Toplama Botunu Başlat (5 Saat 50 Dakika)
        run: |
          if [ ! -f "dataset.csv" ]; then
            touch dataset.csv
          fi
          python collector.py &
          sleep 21000
          pkill -f collector.py || true

      - name: Toplanan Verileri GitHub Deposuna Kaydet (Commit & Push)
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add dataset.csv
          git commit -m "Veri seti güncellendi [Otomatik]" || echo "Değişiklik yok"
          git push

      - name: Sonraki 6 Saatlik Döngüyü Tetikle (Sonsuz Döngü)
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "RESTART_BOT"}'
